<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Lab Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --surface: #ffffff;
    --surface2: #f9f7f4;
    --border: #e0dbd2;
    --border2: #ccc6ba;
    --text: #1a1714;
    --text2: #6b6560;
    --text3: #9c9690;
    --accent: #1a4a8a;
    --accent-light: #e8eff9;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .app-header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header .sub {
    font-size: 12px;
    opacity: 0.7;
    font-family: 'DM Mono', monospace;
  }

  /* ── Controls bar ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  .controls label {
    font-size: 12px;
    color: var(--text2);
    margin-right: -4px;
  }
  .controls input, .controls select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    height: 34px;
  }
  .controls input { min-width: 150px; }
  .controls input:focus, .controls select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: transparent;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    height: 34px;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.accent:hover { background: #133d72; }
  .btn.danger { background: #fff; color: #a32d2d; border-color: #e2a0a0; }
  .btn.danger:hover { background: #fff0f0; }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* ── Week nav ── */
  .week-nav {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .week-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    min-width: 200px;
    text-align: center;
  }

  /* ── Legend ── */
  .legend-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.4rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    min-height: 36px;
  }
  .legend-bar .lbl { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text2);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── Schedule grid ── */
  .grid-container {
    padding: 1rem 1.5rem 2rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  thead tr {
    background: var(--accent);
    color: #fff;
  }
  th {
    font-size: 12px;
    font-weight: 600;
    padding: 10px 8px;
    text-align: center;
    letter-spacing: 0.2px;
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  th:last-child { border-right: none; }
  th.time-th { width: 82px; text-align: left; padding-left: 12px; }
  th.day-th { min-width: 100px; }
  th .date-sub { font-size: 10px; font-weight: 400; opacity: 0.7; display: block; margin-top: 2px; }

  td {
    font-size: 12px;
    padding: 3px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    height: 48px;
  }
  td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }

  td.time-td {
    background: var(--surface2);
    color: var(--text3);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-align: right;
    padding: 0 8px 0 4px;
    vertical-align: middle;
    cursor: default;
    border-right: 2px solid var(--border2);
    white-space: nowrap;
  }
  td.empty-td {
    cursor: pointer;
    transition: background 0.12s;
  }
  td.empty-td:hover {
    background: var(--accent-light);
  }
  td.empty-td:hover::after {
    content: '+';
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: var(--accent);
    font-size: 18px;
    font-weight: 300;
    opacity: 0.5;
  }

  .slot {
    border-radius: 5px;
    padding: 4px 6px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: filter 0.12s;
  }
  .slot:hover { filter: brightness(0.94); }
  .slot .s-teacher { font-size: 11px; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot .s-section { font-size: 10px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot .s-del {
    position: absolute; top: 2px; right: 3px;
    font-size: 11px; font-weight: 700; opacity: 0;
    cursor: pointer; line-height: 1;
    transition: opacity 0.12s;
  }
  .slot:hover .s-del { opacity: 0.7; }
  .slot .s-del:hover { opacity: 1 !important; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20,16,10,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 1.5rem;
    width: 340px;
    max-width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: slideUp 0.18s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 4px;
  }
  .modal .slot-info {
    font-size: 12px; color: var(--text2);
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .field input, .field select {
    font-family: 'DM Sans', sans-serif;
    width: 100%; font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
  }
  .field input:focus, .field select:focus {
    outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent;
  }
  .color-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 4px;
  }
  .color-opt {
    height: 28px; border-radius: 5px; border: 2px solid transparent;
    cursor: pointer; transition: transform 0.1s, border-color 0.1s;
  }
  .color-opt:hover { transform: scale(1.08); }
  .color-opt.selected { border-color: var(--text); }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem;
    padding-top: 1rem; border-top: 1px solid var(--border);
  }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #1a1714; color: #fff; font-size: 13px; padding: 8px 20px;
    border-radius: 99px; z-index: 999; opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Print styles ── */
  @media print {
    .controls, .week-nav .btn, #toast, .modal-overlay { display: none !important; }
    body { background: white; }
    .grid-container { padding: 0; }
    table { box-shadow: none; }
    .slot .s-del { display: none; }
  }

  @media (max-width: 600px) {
    .app-header { padding: 0.75rem 1rem; }
    .controls { padding: 0.5rem 1rem; }
    .grid-container { padding: 0.75rem 0.5rem 2rem; }
    .week-nav { padding: 0.5rem 0.75rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      Computer Lab Scheduler
    </h1>
    <div class="sub">Book your time slot for the week</div>
  </div>
  <button class="btn accent" onclick="window.print()">🖨 Print schedule</button>
</header>

<div class="controls">
  <label>Your name:</label>
  <input id="teacherName" placeholder="e.g. Ms. Santos" autocomplete="name" />
  <label>Section / Subject:</label>
  <input id="sectionName" placeholder="e.g. Grade 9-Rizal / TLE" />
  <label>Color:</label>
  <select id="colorPick">
    <option value="blue">Blue</option>
    <option value="teal">Teal</option>
    <option value="purple">Purple</option>
    <option value="amber">Amber</option>
    <option value="coral">Coral</option>
    <option value="green">Green</option>
    <option value="rose">Rose</option>
    <option value="slate">Slate</option>
  </select>
  <div class="sep"></div>
  <button class="btn danger" onclick="clearMySlots()">✕ Clear my slots</button>
</div>

<div class="week-nav">
  <button class="btn" onclick="changeWeek(-1)">&#8592; Prev</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="btn" onclick="changeWeek(1)">Next &#8594;</button>
  <button class="btn" onclick="goToday()">This week</button>
</div>

<div class="legend-bar">
  <span class="lbl">Teachers:</span>
  <div id="legend" style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;"></div>
</div>

<div class="grid-container">
  <table id="schedTable" role="grid" aria-label="Computer lab schedule">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 id="modalTitle">Book this slot</h2>
    <div class="slot-info" id="slotInfo"></div>
    <div class="field">
      <label for="mTeacher">Teacher name *</label>
      <input id="mTeacher" placeholder="Full name" />
    </div>
    <div class="field">
      <label for="mSection">Section / Subject</label>
      <input id="mSection" placeholder="e.g. Grade 10-Bonifacio / ICT" />
    </div>
    <div class="field">
      <label>Color label</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn accent" onclick="saveSlot()">Book slot</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

// Generate periods 7:00 AM to 5:30 PM in 1-hour slots
const PERIODS = [];
for (let h = 7; h <= 16; h++) {
  const startH = h;
  const endH = h + 1;
  const startLabel = startH < 12 ? `${startH}:00 AM` : startH === 12 ? `12:00 PM` : `${startH-12}:00 PM`;
  const endLabel = endH < 12 ? `${endH}:00 AM` : endH === 12 ? `12:00 PM` : `${endH-12}:00 PM`;
  PERIODS.push(`${startLabel} – ${endLabel}`);
}
// Add 4:00 PM – 5:00 PM and 5:00 PM – 5:30 PM already captured; add the half-hour 5:00–5:30
// Override last entry: 4:00 PM – 5:00 PM, then add 5:00 PM – 5:30 PM
PERIODS.push('5:00 PM – 5:30 PM');
// PERIODS now: 7:00 AM–8:00 AM ... 4:00 PM–5:00 PM, 5:00 PM–5:30 PM

const COLORS = {
  blue:   { bg: '#dbeafe', text: '#1e3a8a', border: '#3b82f6', swatch: '#3b82f6' },
  teal:   { bg: '#ccfbf1', text: '#134e4a', border: '#14b8a6', swatch: '#14b8a6' },
  purple: { bg: '#ede9fe', text: '#3b0764', border: '#8b5cf6', swatch: '#8b5cf6' },
  amber:  { bg: '#fef3c7', text: '#78350f', border: '#f59e0b', swatch: '#f59e0b' },
  coral:  { bg: '#fee2e2', text: '#7f1d1d', border: '#f87171', swatch: '#f87171' },
  green:  { bg: '#dcfce7', text: '#14532d', border: '#22c55e', swatch: '#22c55e' },
  rose:   { bg: '#fce7f3', text: '#831843', border: '#ec4899', swatch: '#ec4899' },
  slate:  { bg: '#f1f5f9', text: '#1e293b', border: '#94a3b8', swatch: '#94a3b8' },
};

let weekOffset = 0;
let schedule = {};   // { weekKey: { cellId: { teacher, section, color } } }
let pendingCell = null;
let selectedColor = 'blue';

const STORAGE_KEY = 'labsched_v1';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    schedule = raw ? JSON.parse(raw) : {};
  } catch(e) { schedule = {}; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule)); }
  catch(e) { toast('Storage full — old weeks cleared'); pruneOldWeeks(); }
}

function pruneOldWeeks() {
  const now = Date.now();
  Object.keys(schedule).forEach(k => {
    const d = new Date(k);
    if (!isNaN(d) && (now - d.getTime()) > 60 * 24 * 3600 * 1000) delete schedule[k];
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule)); } catch(e) {}
}

function getWeekKey(offset) {
  const d = getMondayOfWeek(offset);
  return d.toISOString().slice(0, 10);
}

function getMondayOfWeek(offset) {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDates(offset) {
  const mon = getMondayOfWeek(offset);
  return DAYS.map((_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function fmt(d) {
  return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
}

function currentWeekSlots() {
  const k = getWeekKey(weekOffset);
  if (!schedule[k]) schedule[k] = {};
  return schedule[k];
}

function renderHeader() {
  const dates = getWeekDates(weekOffset);
  document.getElementById('weekLabel').textContent =
    fmt(dates[0]) + ' – ' + fmt(dates[4]) + ', ' + dates[0].getFullYear();

  let html = `<tr>
    <th class="time-th">Time</th>`;
  DAYS.forEach((d, i) => {
    html += `<th class="day-th">${d}<span class="date-sub">${fmt(dates[i])}</span></th>`;
  });
  html += '</tr>';
  document.getElementById('tableHead').innerHTML = html;
}

function renderBody() {
  const slots = currentWeekSlots();
  let html = '';
  PERIODS.forEach((p, pi) => {
    html += `<tr><td class="time-td">${p}</td>`;
    DAYS.forEach((_, di) => {
      const cid = `${pi}_${di}`;
      const slot = slots[cid];
      if (slot) {
        const c = COLORS[slot.color] || COLORS.blue;
        html += `<td style="padding:3px;cursor:default">
          <div class="slot" style="background:${c.bg};color:${c.text};border-left:3px solid ${c.border}"
               onclick="removeSlot('${cid}')" title="Click to remove">
            <span class="s-teacher">${esc(slot.teacher)}</span>
            <span class="s-section">${esc(slot.section)}</span>
            <span class="s-del" title="Remove">✕</span>
          </div></td>`;
      } else {
        html += `<td class="empty-td" onclick="openModal(${pi},${di})"
          title="Click to book: ${p}"></td>`;
      }
    });
    html += '</tr>';
  });
  document.getElementById('tableBody').innerHTML = html;
  renderLegend();
}

function renderLegend() {
  const slots = currentWeekSlots();
  const teachers = {};
  Object.values(slots).forEach(s => {
    if (s && !teachers[s.teacher]) teachers[s.teacher] = s.color;
  });
  const leg = document.getElementById('legend');
  if (!Object.keys(teachers).length) {
    leg.innerHTML = '<span style="font-size:12px;color:var(--text3)">No bookings yet this week</span>';
    return;
  }
  leg.innerHTML = Object.entries(teachers).map(([t, c]) => {
    const col = COLORS[c] || COLORS.blue;
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${col.border}"></div>
      <span>${esc(t)}</span>
    </div>`;
  }).join('');
}

function buildColorGrid(selected) {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = Object.entries(COLORS).map(([k, v]) =>
    `<div class="color-opt ${k === selected ? 'selected' : ''}"
      style="background:${v.swatch}"
      title="${k}"
      onclick="selectColor('${k}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.title === c);
  });
}

function openModal(pi, di) {
  pendingCell = `${pi}_${di}`;
  const dates = getWeekDates(weekOffset);
  const t = document.getElementById('teacherName').value.trim();
  const s = document.getElementById('sectionName').value.trim();
  const c = document.getElementById('colorPick').value;
  selectedColor = c;

  document.getElementById('mTeacher').value = t;
  document.getElementById('mSection').value = s;
  document.getElementById('slotInfo').textContent =
    `${PERIODS[pi]}  ·  ${DAYS[di]}, ${fmt(dates[di])}`;
  buildColorGrid(c);
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('mTeacher').focus(), 80);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingCell = null;
}

function saveSlot() {
  const teacher = document.getElementById('mTeacher').value.trim();
  const section = document.getElementById('mSection').value.trim();
  if (!teacher) { document.getElementById('mTeacher').focus(); return; }
  document.getElementById('teacherName').value = teacher;
  document.getElementById('sectionName').value = section;
  document.getElementById('colorPick').value = selectedColor;

  currentWeekSlots()[pendingCell] = { teacher, section, color: selectedColor };
  save();
  closeModal();
  renderBody();
  toast('Slot booked!');
}

function removeSlot(cid) {
  if (!confirm('Remove this booking?')) return;
  delete currentWeekSlots()[cid];
  save();
  renderBody();
  toast('Booking removed.');
}

function clearMySlots() {
  const name = document.getElementById('teacherName').value.trim();
  if (!name) { alert('Enter your name first so we know which slots to clear.'); return; }
  if (!confirm(`Remove all slots booked by "${name}" this week?`)) return;
  const slots = currentWeekSlots();
  let count = 0;
  Object.keys(slots).forEach(k => {
    if (slots[k] && slots[k].teacher === name) { delete slots[k]; count++; }
  });
  save();
  renderBody();
  toast(count ? `Cleared ${count} slot${count > 1 ? 's' : ''}.` : 'No slots found for that name.');
}

function changeWeek(dir) {
  weekOffset += dir;
  renderHeader();
  renderBody();
}

function goToday() {
  weekOffset = 0;
  renderHeader();
  renderBody();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Close modal on overlay click or Escape
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveSlot();
});

// Init
load();
renderHeader();
renderBody();
</script>
</body>
</html>
